syntax = "proto3";
package CoffeeShop;

option go_package = "github.com/momoney3/cloud-feona";

service CoffeeShop {
  rpc GetMenu(MenuRequest) returns (stream Menu) {}
  rpc PlaceOrder(Order) returns (Receipt) {}
  rpc GetOrderStatus(Receipt) returns (OrderStatus) {}
}

// making change to th
message MenuRequest {}

message Order {
  repeated Item item = 1;
}

message Receipt {
  string id = 1;
}

message OrderStatus {
  string orderId = 1;
  string status = 2;
}


message Menu {
  repeated Item item = 1;
}

message Item {
  string id = 1;
  string name = 2;
}

